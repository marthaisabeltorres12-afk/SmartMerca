<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catálogo</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b}
    .header{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff;padding:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
    .header h1{font-size:20px;font-weight:800}
    .header p{font-size:12px;opacity:.85;margin-top:2px}
    .search-bar input{width:100%;padding:10px 14px;border-radius:10px;border:none;font-size:15px;outline:none;margin-top:10px}
    .cats{display:flex;gap:8px;overflow-x:auto;padding:10px 14px;background:#fff;border-bottom:1px solid #e2e8f0;scrollbar-width:none}
    .cats::-webkit-scrollbar{display:none}
    .cat-btn{padding:6px 14px;border-radius:20px;border:2px solid #e2e8f0;background:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
    .cat-btn.active{background:#1e3a5f;color:#fff;border-color:#1e3a5f}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;padding:14px;padding-bottom:80px}
    @media(max-width:400px){.grid{grid-template-columns:repeat(2,1fr)}}
    .card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07);cursor:pointer}
    .card:active{transform:scale(.97)}
    .card-img{width:100%;height:110px;display:flex;align-items:center;justify-content:center;font-size:42px;background:#f8fafc}
    .card-body{padding:10px 12px 12px}
    .card-name{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:2px}
    .card-cat{font-size:11px;color:#64748b;margin-bottom:4px}
    .card-price{font-size:15px;font-weight:800;color:#16a34a}
    .card-tag{font-size:10px;color:#94a3b8;margin-top:2px}
    .card-btn{margin-top:8px;width:100%;padding:8px;background:#25d366;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer}
    /* Barra carrito */
    .cart-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e2e8f0;padding:10px 14px;z-index:150}
    .cart-toggle{width:100%;background:#1e3a5f;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
    .cart-badge{background:#ef4444;border-radius:20px;padding:2px 10px;font-size:13px}
    /* Panel carrito */
    .cart-panel{display:none;position:fixed;inset:0;background:#fff;z-index:300;flex-direction:column}
    .cart-panel.show{display:flex}
    .cart-header{background:#1e3a5f;color:#fff;padding:16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
    .cart-body{flex:1;overflow-y:auto;padding:14px}
    .cart-item{background:#f8fafc;border-radius:12px;padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
    .ci-info{flex:1}
    .ci-name{font-weight:700;font-size:14px}
    .ci-detail{font-size:12px;color:#64748b;margin-top:2px}
    .ci-price{font-weight:800;color:#16a34a;font-size:15px;white-space:nowrap}
    .ci-del{background:none;border:none;font-size:22px;cursor:pointer;color:#ef4444;padding:4px;flex-shrink:0}
    .cart-foot{padding:14px;border-top:1px solid #e2e8f0;flex-shrink:0;background:#fff}
    .cart-total-big{font-size:22px;font-weight:800;text-align:center;margin-bottom:12px}
    .continue-btn{width:100%;background:#25d366;color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700;cursor:pointer}
    /* Modal producto */
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end}
    .overlay.show{display:flex}
    .modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:20px 18px;position:relative}
    .modal-close{position:absolute;top:16px;right:16px;font-size:22px;cursor:pointer;background:none;border:none;color:#64748b}
    .m-price{font-size:26px;font-weight:800;color:#16a34a;margin:6px 0 2px}
    .m-label{font-size:12px;color:#94a3b8;margin-bottom:12px}
    .section-title{font-size:13px;font-weight:700;color:#475569;margin:12px 0 8px}
    .unit-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
    .unit-btn{padding:10px 4px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;font-size:12px;font-weight:700;cursor:pointer;text-align:center}
    .unit-btn.active{background:#1e3a5f;color:#fff;border-color:#1e3a5f}
    .qty-row{display:flex;align-items:center;gap:12px;margin:10px 0}
    .qty-btn{width:44px;height:44px;border-radius:50%;border:2px solid #e2e8f0;background:#f8fafc;font-size:22px;cursor:pointer;font-weight:700;flex-shrink:0}
    .weight-input{flex:1;padding:10px;font-size:22px;font-weight:700;border:2px solid #3b82f6;border-radius:10px;text-align:center;outline:none}
    .qty-display{flex:1;text-align:center;font-size:26px;font-weight:800}
    .total-preview{text-align:center;font-size:20px;font-weight:800;color:#16a34a;margin:8px 0 12px}
    .add-btn{width:100%;background:#1e3a5f;color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700;cursor:pointer}
    /* Modal envío */
    .envio-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;align-items:flex-end}
    .envio-bg.show{display:flex}
    .envio-modal{background:#fff;border-radius:20px 20px 0 0;width:100%;padding:20px 18px 30px}
    .envio-opt{display:flex;align-items:center;gap:14px;padding:14px;border-radius:12px;border:2px solid #e2e8f0;cursor:pointer;margin-bottom:10px}
    .envio-opt.sel{border-color:#1e3a5f;background:#eff6ff}
    .envio-icon{font-size:32px;flex-shrink:0}
    .envio-lbl{font-weight:700;font-size:15px}
    .envio-sub{font-size:12px;color:#64748b}
    .addr-input{width:100%;padding:12px;border:2px solid #3b82f6;border-radius:10px;font-size:14px;outline:none;margin-top:10px;display:none}
    .addr-input.show{display:block}
    .wa-send{width:100%;background:#25d366;color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px}
    .empty{text-align:center;padding:60px 20px;color:#94a3b8;grid-column:1/-1}
    .empty div{font-size:48px;margin-bottom:12px}
  </style>
</head>
<body>

<div class="header">
  <h1 id="biz-name">🛒 Catálogo</h1>
  <p id="biz-addr"></p>
  <div class="search-bar">
    <input type="search" id="search" placeholder="🔍 Buscar producto..." oninput="renderGrid()"/>
  </div>
</div>

<div class="cats" id="cats"></div>
<div class="grid" id="grid"></div>

<!-- Barra inferior carrito -->
<div class="cart-bar">
  <button class="cart-toggle" onclick="toggleCart()">
    <span>🛒 Ver mi pedido</span>
    <span class="cart-badge" id="cart-badge">0 items — $0</span>
  </button>
</div>

<!-- Panel carrito -->
<div class="cart-panel" id="cart-panel">
  <div class="cart-header">
    <button onclick="toggleCart()" style="background:none;border:none;color:#fff;font-size:24px;cursor:pointer">←</button>
    <h2 style="font-size:18px;font-weight:800;flex:1">🛒 Mi pedido</h2>
  </div>
  <div class="cart-body" id="cart-body">
    <p class="empty" style="padding:40px 20px;text-align:center;color:#94a3b8">Tu pedido está vacío</p>
  </div>
  <div class="cart-foot">
    <div class="cart-total-big" id="cart-total">Total: $0</div>
    <button class="continue-btn" onclick="openEnvio()">
      📦 Finalizar pedido →
    </button>
  </div>
</div>

<!-- Modal producto -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div style="font-size:40px;text-align:center;margin-bottom:8px" id="m-emoji"></div>
    <h2 style="font-size:20px;font-weight:800" id="m-name"></h2>
    <div style="font-size:12px;color:#64748b;margin-bottom:4px" id="m-cat"></div>
    <div class="m-price" id="m-price"></div>
    <div class="m-label" id="m-label"></div>

    <!-- Selector unidades (solo productos por peso) -->
    <div id="peso-section" style="display:none">
      <div class="section-title">⚖️ ¿En qué unidad quieres pedir?</div>
      <div class="unit-grid">
        <button class="unit-btn active" data-u="kg"   data-f="1"        onclick="selUnit(this)">Kg</button>
        <button class="unit-btn"        data-u="lb"   data-f="0.453592" onclick="selUnit(this)">Libra</button>
        <button class="unit-btn"        data-u="500g" data-f="0.5"      onclick="selUnit(this)">½ kg</button>
        <button class="unit-btn"        data-u="250g" data-f="0.25"     onclick="selUnit(this)">¼ kg</button>
        <button class="unit-btn"        data-u="100g" data-f="0.1"      onclick="selUnit(this)">100g</button>
        <button class="unit-btn"        data-u="50g"  data-f="0.05"     onclick="selUnit(this)">50g</button>
      </div>
      <div class="section-title">Cantidad</div>
      <div class="qty-row">
        <button class="qty-btn" onclick="adjW(-1)">−</button>
        <input type="number" class="weight-input" id="w-input" min="0.1" step="0.1" value="1" oninput="updW()"/>
        <button class="qty-btn" onclick="adjW(1)">+</button>
      </div>
      <div style="text-align:center;font-size:12px;color:#94a3b8;margin-bottom:4px" id="w-unit-label">kg</div>
    </div>

    <!-- Selector unidades normales -->
    <div id="uni-section" style="display:none">
      <div class="section-title">Cantidad</div>
      <div class="qty-row">
        <button class="qty-btn" onclick="adjQ(-1)">−</button>
        <div class="qty-display" id="qty-display">1</div>
        <button class="qty-btn" onclick="adjQ(1)">+</button>
      </div>
    </div>

    <div class="total-preview" id="total-preview"></div>
    <button class="add-btn" onclick="addToCart()">🛒 Agregar al pedido</button>
  </div>
</div>

<!-- Modal envío -->
<div class="envio-bg" id="envio-bg">
  <div class="envio-modal">
    <h3 style="font-weight:800;font-size:18px;margin-bottom:16px">¿Cómo quieres recibir tu pedido?</h3>
    <div class="envio-opt" id="opt-tienda" onclick="selEnvio('tienda')">
      <div class="envio-icon">🏪</div>
      <div>
        <div class="envio-lbl">Recoger en tienda</div>
        <div class="envio-sub">Sin costo adicional</div>
      </div>
    </div>
    <div class="envio-opt" id="opt-domicilio" onclick="selEnvio('domicilio')">
      <div class="envio-icon">🛵</div>
      <div>
        <div class="envio-lbl">Domicilio</div>
        <div class="envio-sub">Ingresa tu dirección</div>
      </div>
    </div>
    <input type="text" class="addr-input" id="addr-input" placeholder="Ej: Calle 10 #5-23, Barrio Centro"/>
    <button class="wa-send" onclick="sendWhatsApp()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z"/></svg>
      Enviar pedido por WhatsApp
    </button>
    <button onclick="document.getElementById('envio-bg').classList.remove('show')"
      style="width:100%;margin-top:10px;background:none;border:none;color:#64748b;font-size:14px;cursor:pointer;padding:8px">
      ← Volver al pedido
    </button>
  </div>
</div>

<script>
const API = 'http://localhost:5000/api/catalogo/productos';
const fmt = n => '$' + Number(n||0).toLocaleString('es-CO');
const CATS_PESO = ['frutas','verduras','tuberculos','carnes','pescados','granos'];
const EMOJI_MAP = {frutas:'🍎',verduras:'🥦',tuberculos:'🥔',carnes:'🥩',lacteos:'🥛',
  bebidas:'🥤',panaderia:'🍞',aseo:'🧹',licores:'🍷',general:'🛒',granos:'🌾',pescados:'🐟'};

let allProds=[], cart=[], bizPhone='', activeCat='Todos', envioType='tienda';
let curProd=null, curQty=1, curUnit='kg', curFactor=1, curW=1, isPeso=false;

function isPesoProduct(p){
  return CATS_PESO.some(c=>(p.category||'').toLowerCase().includes(c));
}
function getEmoji(p){
  return EMOJI_MAP[(p.category||'').toLowerCase()]||'🛒';
}

function getImgUrl(p){
  const emoji=getEmoji(p);
  if(p.image_url){
    return `<img src="${p.image_url}" alt="${p.name}"
      style="width:100%;height:100%;object-fit:cover"
      onerror="this.parentElement.innerHTML='<span style=font-size:42px>${emoji}</span>'"/>`;
  }
  // Buscar imagen en Wikipedia por nombre del producto
  const id=`img-${p.id}`;
  const q=encodeURIComponent(p.name);
  setTimeout(()=>loadWikiImg(id, p.name, emoji), 100);
  return `<span id="${id}" style="font-size:42px">${emoji}</span>`;
}

async function loadWikiImg(id, name, fallbackEmoji){
  try{
    // Mapa de nombres en español → inglés para Wikipedia
    const enMap = {
      'guayaba':'guava','arroz':'rice','azucar':'sugar','frijol':'bean',
      'frijol rojo':'kidney bean','lentejas':'lentil','huevos':'egg',
      'tomate':'tomato','piña':'pineapple','carambola':'carambola',
      'banano':'banana','mango':'mango','papa':'potato','yuca':'cassava',
      'zanahoria':'carrot','cebolla':'onion','ajo':'garlic','repollo':'cabbage',
      'pimentón':'bell pepper','mazorca':'corn','brócoli':'broccoli',
      'naranja':'orange','limón':'lemon','sandía':'watermelon','papaya':'papaya',
      'manzana':'apple','uva':'grape','fresa':'strawberry','leche':'milk',
      'queso':'cheese','mantequilla':'butter','agua':'water','jugo':'juice',
      'aceite':'cooking oil','sal':'salt','harina':'flour','pan':'bread',
      'plátano':'plantain','ahuyama':'squash','espinaca':'spinach',
      'lechuga':'lettuce','pepino':'cucumber','habichuela':'green bean',
    };
    const q = name.toLowerCase();
    const searchTerm = Object.keys(enMap).find(k => q.includes(k))
      ? enMap[Object.keys(enMap).find(k => q.includes(k))]
      : name;

    const url=`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(searchTerm)}&prop=pageimages&format=json&pithumbsize=200&origin=*`;
    const res=await fetch(url);
    const data=await res.json();
    const pages=data.query?.pages||{};
    const page=Object.values(pages)[0];
    const imgUrl=page?.thumbnail?.source;
    const el=document.getElementById(id);
    if(imgUrl && el){
      el.outerHTML=`<img src="${imgUrl}" alt="${name}" style="width:100%;height:100%;object-fit:cover" onerror="this.outerHTML='<span style=font-size:42px>${fallbackEmoji}</span>'"/>`;
    }
  }catch{}
}

async function init(){
  try{
    const res=await fetch(API);
    const d=await res.json();
    allProds=d.products||[];
    bizPhone=(d.business_phone||'').replace(/\D/g,'');
    document.getElementById('biz-name').textContent='🛒 '+(d.business_name||'Catálogo');
    document.getElementById('biz-addr').textContent=d.business_address||'';
    renderCats(); renderGrid();
  }catch{
    document.getElementById('grid').innerHTML='<div class="empty"><div>⚠️</div><p>No se pudo conectar.<br>Verifica que estés en la red WiFi del negocio.</p></div>';
  }
}

function renderCats(){
  const cats=['Todos',...new Set(allProds.map(p=>p.category).filter(Boolean).sort())];
  document.getElementById('cats').innerHTML=cats.map(c=>
    `<button class="cat-btn ${c===activeCat?'active':''}" onclick="selectCat('${c}')">${c}</button>`
  ).join('');
}

function selectCat(c){activeCat=c;renderCats();renderGrid();}

function renderGrid(){
  const q=document.getElementById('search').value.toLowerCase();
  const prods=allProds.filter(p=>
    (activeCat==='Todos'||p.category===activeCat)&&
    (!q||p.name.toLowerCase().includes(q))&&p.stock>0
  );
  if(!prods.length){
    document.getElementById('grid').innerHTML='<div class="empty"><div>🔍</div><p>Sin resultados</p></div>';
    return;
  }
  document.getElementById('grid').innerHTML=prods.map(p=>{
    const peso=isPesoProduct(p);
    return `<div class="card" onclick="openModal(${p.id})">
      <div class="card-img">${getImgUrl(p)}</div>
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-cat">${p.category||'General'}</div>
        <div class="card-price">${fmt(p.price)}${peso?' / kg':''}</div>
        ${p.gramaje?`<div class="card-tag">📦 ${p.gramaje}</div>`:''}
        ${peso?'<div class="card-tag">⚖️ Por peso</div>':''}
        <button class="card-btn" onclick="event.stopPropagation();openModal(${p.id})">${peso?'⚖️ Elegir peso':'+ Agregar'}</button>
      </div>
    </div>`;
  }).join('');
}

function openModal(id){
  curProd=allProds.find(p=>p.id===id); if(!curProd)return;
  curQty=1; curW=1; curUnit='kg'; curFactor=1;
  isPeso=isPesoProduct(curProd);
  document.getElementById('m-emoji').innerHTML=curProd.image_url
    ? `<img src="${curProd.image_url}" style="width:80px;height:80px;object-fit:cover;border-radius:12px"/>`
    : `<img src="https://source.unsplash.com/80x80/?${encodeURIComponent(curProd.name+' food')}" style="width:80px;height:80px;object-fit:cover;border-radius:12px" onerror="this.outerHTML='${getEmoji(curProd)}'"/>`;
  document.getElementById('m-name').textContent=curProd.name;
  document.getElementById('m-cat').textContent=curProd.category||'';
  document.getElementById('m-price').textContent=fmt(curProd.price);
  document.getElementById('m-label').textContent=isPeso?'por kilogramo':(curProd.gramaje?'📦 '+curProd.gramaje:'por unidad');
  document.getElementById('peso-section').style.display=isPeso?'block':'none';
  document.getElementById('uni-section').style.display=isPeso?'none':'block';
  // Reset unit buttons
  document.querySelectorAll('.unit-btn').forEach(b=>b.classList.remove('active'));
  const kgBtn=document.querySelector('.unit-btn[data-u="kg"]');
  if(kgBtn)kgBtn.classList.add('active');
  document.getElementById('w-unit-label').textContent='kg';
  document.getElementById('w-input').value='1';
  document.getElementById('qty-display').textContent='1';
  updTotal();
  document.getElementById('overlay').classList.add('show');
}

function closeModal(e){
  if(!e||e.target===document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('show');
}

function selUnit(btn){
  document.querySelectorAll('.unit-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  curUnit=btn.dataset.u; curFactor=parseFloat(btn.dataset.f);
  document.getElementById('w-unit-label').textContent=curUnit;
  const inp=document.getElementById('w-input');
  if(curUnit==='kg'){inp.step='0.1';inp.min='0.1';}
  else if(curUnit==='lb'){inp.step='0.5';inp.min='0.5';}
  else{inp.step='1';inp.min='1';}
  updW();
}

function adjW(d){
  const inp=document.getElementById('w-input');
  const step=parseFloat(inp.step)||0.1;
  curW=Math.max(parseFloat(inp.min)||0.1, Math.round((parseFloat(inp.value||1)+d*step)*100)/100);
  inp.value=curW; updTotal();
}
function updW(){curW=parseFloat(document.getElementById('w-input').value)||0;updTotal();}
function adjQ(d){curQty=Math.max(1,curQty+d);document.getElementById('qty-display').textContent=curQty;updTotal();}
function updTotal(){
  if(!curProd)return;
  const total=isPeso?(curProd.price*curW*curFactor):(curProd.price*curQty);
  const label=isPeso?`${curW} ${curUnit} = ${fmt(total)}`:fmt(total);
  document.getElementById('total-preview').textContent=label;
}

function addToCart(){
  if(!curProd)return;
  if(isPeso){
    const w=parseFloat(document.getElementById('w-input').value)||0;
    if(w<=0){alert('Ingresa una cantidad válida');return;}
    const kg=w*curFactor;
    cart.push({key:Date.now(),id:curProd.id,name:curProd.name,
      peso:w,unit:curUnit,kg,total:curProd.price*kg,
      label:`${curProd.name} — ${w} ${curUnit}`});
  }else{
    const ex=cart.find(i=>i.id===curProd.id&&!i.peso);
    if(ex){ex.qty+=curQty;ex.total=curProd.price*ex.qty;}
    else cart.push({key:Date.now(),id:curProd.id,name:curProd.name,
      qty:curQty,total:curProd.price*curQty,label:`${curProd.name} x${curQty}`});
  }
  closeModal();
  renderCart();
  showToast(`✅ ${curProd.name} agregado`);
}

function removeFromCart(key){
  cart=cart.filter(i=>i.key!==key);
  renderCart();
}

function renderCart(){
  const total=cart.reduce((a,i)=>a+i.total,0);
  const count=cart.length;
  document.getElementById('cart-badge').textContent=`${count} item${count!==1?'s':''} — ${fmt(total)}`;
  document.getElementById('cart-total').textContent=`Total: ${fmt(total)}`;
  if(!cart.length){
    document.getElementById('cart-body').innerHTML='<p style="text-align:center;color:#94a3b8;padding:40px 20px">Tu pedido está vacío</p>';
    return;
  }
  document.getElementById('cart-body').innerHTML=cart.map(i=>`
    <div class="cart-item">
      <div class="ci-info">
        <div class="ci-name">${i.name}</div>
        <div class="ci-detail">${i.peso?`${i.peso} ${i.unit}`:`x${i.qty} unidades`}</div>
      </div>
      <div class="ci-price">${fmt(i.total)}</div>
      <button class="ci-del" onclick="removeFromCart(${i.key})">🗑</button>
    </div>
  `).join('');
}

function toggleCart(){
  document.getElementById('cart-panel').classList.toggle('show');
}

function openEnvio(){
  if(!cart.length){alert('Agrega productos primero');return;}
  document.getElementById('cart-panel').classList.remove('show');
  document.getElementById('envio-bg').classList.add('show');
  selEnvio('tienda');
}

function selEnvio(tipo){
  envioType=tipo;
  document.getElementById('opt-tienda').classList.toggle('sel',tipo==='tienda');
  document.getElementById('opt-domicilio').classList.toggle('sel',tipo==='domicilio');
  const addr=document.getElementById('addr-input');
  addr.classList.toggle('show',tipo==='domicilio');
}

function sendWhatsApp(){
  if(envioType==='domicilio'){
    const addr=document.getElementById('addr-input').value.trim();
    if(!addr){alert('Ingresa tu dirección de domicilio');document.getElementById('addr-input').focus();return;}
  }
  const lines=cart.map(i=>`• ${i.label} = ${fmt(i.total)}`);
  const total=cart.reduce((a,i)=>a+i.total,0);
  const entrega=envioType==='tienda'
    ? '🏪 *Recojo en tienda*'
    : `🛵 *Domicilio a:* ${document.getElementById('addr-input').value}`;
  const msg=`🛒 *Pedido SmartMerca*\n\n${lines.join('\n')}\n\n*Total estimado: ${fmt(total)}*\n\n${entrega}\n\n_Enviado desde el catálogo en línea_`;
  const phone=bizPhone||'573000000000';
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,'_blank');
}

function showToast(msg){
  const t=document.createElement('div');
  t.textContent=msg;
  Object.assign(t.style,{position:'fixed',bottom:'80px',left:'50%',transform:'translateX(-50%)',
    background:'#1e3a5f',color:'#fff',padding:'10px 20px',borderRadius:'10px',
    fontSize:'14px',fontWeight:'600',zIndex:'999',whiteSpace:'nowrap',
    boxShadow:'0 4px 12px rgba(0,0,0,.2)'});
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2200);
}

init();
</script>
</body>
</html>
